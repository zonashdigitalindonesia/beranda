<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Zonash Digital</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }
        #sidebar { width: 260px; background: #2c3e50; color: white; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        h2 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid #34495e; padding-bottom: 10px; text-align: center; }
        .menu-label { font-size: 0.75rem; color: #95a5a6; text-transform: uppercase; margin: 15px 0 5px 0; display: block; }
        .menu-item { display: block; color: #bdc3c7; padding: 10px; text-decoration: none; cursor: pointer; border-radius: 4px; transition: 0.3s; font-size: 0.9rem; }
        .menu-item:hover { background: #34495e; color: white; }
        #iframe-container { flex: 1; border: none; background: #fff; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Zonash Digital</h2>
        <a class="menu-item" onclick="loadPage('home.html')">🏠 Home</a>

        <span class="menu-label">Transaksi</span>
        <a class="menu-item" onclick="loadPage('transaksi/penawaran.html')">📝 Penawaran</a>
        <a class="menu-item" onclick="loadPage('transaksi/sales-order.html')">📄 Sales Order</a>
        <a class="menu-item" onclick="loadPage('transaksi/so-rincian.html')">📋 SO Rincian</a>

        <span class="menu-label">Dokumen Keuangan</span>
        <a class="menu-item" onclick="loadPage('dokumen-keuangan/invoice.html')">💵 Invoice</a>
        <a class="menu-item" onclick="loadPage('dokumen-keuangan/kwitansi-1.html')">🧾 Kwitansi (1 Halaman)</a>
        <a class="menu-item" onclick="loadPage('dokumen-keuangan/kwitansi-2.html')">🧾 Kwitansi (2 Halaman)</a>
    </div>

    <iframe id="iframe-container" src="home.html"></iframe>

    <script>
        function loadPage(url) {
            document.getElementById('iframe-container').src = url;
        }
    </script>
</body>
</html>
